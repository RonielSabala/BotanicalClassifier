[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "botanical-classifier"
version = "0.1.0"
description = "Desktop Python application for classifying five flower species using Azure Custom Vision."
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "Roniel Sabala", email = "ronielsabala@gmail.com" }]
keywords = ["botany", "computer-vision", "custom-vision", "azure", "flowers"]
requires-python = ">=3.11"
dependencies = [
    "Pillow",
    "python-dotenv",
    "azure-cognitiveservices-vision-customvision",
    "msrest",
]

[project.optional-dependencies]
dev = ["ruff"]
